<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Email Sender</title>
<style>
body{
font-family: Arial, sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.card{
background:white;
padding:30px;
border-radius:10px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
h2{margin-top:0}
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}
button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
background:#111;
color:white;
border-radius:6px;
cursor:pointer;
font-size:15px;
}
button:hover{opacity:0.9}
#status{margin-top:10px;font-size:14px}
</style>
</head>

<body>

<div class="card">
<h2>Send Client Email</h2>

<input id="to" placeholder="Client Email">
<input id="subject" placeholder="Subject">
<textarea id="message" rows="6" placeholder="Message"></textarea>

<button onclick="sendEmail()">Send Email</button>

<div id="status"></div>
</div>

<script>
async function sendEmail(){

const to=document.getElementById("to").value
const subject=document.getElementById("subject").value
const message=document.getElementById("message").value

document.getElementById("status").innerText="Sending..."

const res=await fetch("/.netlify/functions/send-email",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({to,subject,message})
})

const data=await res.json()

if(data.success){
document.getElementById("status").innerText="Email sent successfully"
}else{
document.getElementById("status").innerText="Error sending email"
}

}
</script>

</body>
</html>
